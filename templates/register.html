<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Wallet - Register</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
</head>
<body id="login-body">
    <div id="login-card">
        <header id="login-header">
            <h1>Create Account</h1>
            <p>Sign up to start using Smart Wallet</p>
        </header>

        <form id="login-form" method="post" action="{% url 'register' %}">
            {% csrf_token %}

            {% if error %}
                <div class="form-error" style="color:#dc2626;padding:12px 16px;background:#fef2f2;border-radius:10px;border:1px solid #fecaca;margin-bottom:20px;font-size:0.95rem;">{{ error }}</div>
            {% endif %}

            <div style="margin-bottom:20px;">
                <label class="login-label" for="name">Full Name</label>
                <input class="form-input" type="text" name="name" placeholder="John Doe" required />
            </div>

            <div style="margin-bottom:20px;">
                <label class="login-label" for="email">Email Address</label>
                <input class="form-input" type="email" name="email" placeholder="name@example.com" required />
            </div>

            <div style="margin-bottom:20px;">
                <label class="login-label" for="password">Password</label>
                <input class="form-input" type="password" name="password" placeholder="Create a strong password" required />
            </div>

            <div style="margin-bottom:24px;">
                <label class="login-label" for="password_confirm">Confirm Password</label>
                <input class="form-input" type="password" name="password_confirm" placeholder="Re-enter your password" required />
            </div>

            <button id="login-btn" type="submit">Create Account</button>
        </form>

        <div id="login-footer">
            Already have an account? <a href="{% url 'login' %}" id="login-link-home">Sign In</a>
        </div>
    </div>
</body>
</html>

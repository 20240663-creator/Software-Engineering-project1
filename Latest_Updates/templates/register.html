<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Wallet - Create Account</title>
    <link rel="stylesheet" href="../static/css/style.css" />
    <style>
        .auth-card {
            max-width: 480px;
        }
        
        .password-strength {
            margin-top: 0.5rem;
            font-size: 0.75rem;
        }
        
        .strength-bar {
            height: 4px;
            background: #e5e7eb;
            border-radius: 2px;
            margin-top: 0.5rem;
            overflow: hidden;
        }
        
        .strength-fill {
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }
        
        .strength-fill.weak { background: var(--danger); width: 33%; }
        .strength-fill.medium { background: var(--warning); width: 66%; }
        .strength-fill.strong { background: var(--success); width: 100%; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo" style="font-size: 2rem; margin-bottom: 1rem;">💰 Smart Wallet</div>
                <h1>Create Account ✨</h1>
                <p>Join Smart Wallet and start managing your finances</p>
            </div>

            <form id="register-form">
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" id="username" class="form-control" placeholder="John Doe" required />
                </div>

                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="hello@example.com" required />
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Create a strong password" required />
                    <div class="password-strength" id="passwordStrength"></div>
                    <div class="strength-bar">
                        <div class="strength-fill" id="strengthFill"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" id="re_password" class="form-control" placeholder="Confirm your password" required />
                </div>

                <div class="form-group">
                    <label style="display: flex; align-items: center; gap: 0.75rem; cursor: pointer;">
                        <input type="checkbox" id="termsCheckbox" required style="accent-color: var(--primary);" />
                        <span style="font-size: 0.875rem; color: var(--gray);">I agree to the <a href="#" style="color: var(--primary);">Terms of Service</a> and <a href="#" style="color: var(--primary);">Privacy Policy</a></span>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    <span>Create Account</span>
                    <span>→</span>
                </button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="login.html" style="color: var(--primary); font-weight: 600; text-decoration: none;">Sign In</a></p>
            </div>
        </div>
    </div>

    <script src="../static/js/config.js"></script>
    <script src="../static/js/auth.js"></script>
    
    <script>
        // Password strength checker
        const passwordInput = document.getElementById('password');
        const strengthDiv = document.getElementById('passwordStrength');
        const strengthFill = document.getElementById('strengthFill');
        
        function checkPasswordStrength(password) {
            let strength = 0;
            
            if (password.length >= 8) strength++;
            if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength++;
            if (password.match(/\d/)) strength++;
            if (password.match(/[^a-zA-Z\d]/)) strength++;
            
            if (strength === 0) return { text: '', class: '' };
            if (strength === 1) return { text: 'Weak Password', class: 'weak' };
            if (strength === 2) return { text: 'Medium Password', class: 'medium' };
            if (strength >= 3) return { text: 'Strong Password!', class: 'strong' };
        }
        
        passwordInput.addEventListener('input', function() {
            const result = checkPasswordStrength(this.value);
            if (result.text) {
                strengthDiv.textContent = result.text;
                strengthDiv.style.color = result.class === 'weak' ? 'var(--danger)' : result.class === 'medium' ? 'var(--warning)' : 'var(--success)';
                strengthFill.className = `strength-fill ${result.class}`;
            } else {
                strengthDiv.textContent = '';
                strengthFill.className = 'strength-fill';
            }
        });
        
        // Password match validation
        const confirmPassword = document.getElementById('re_password');
        const form = document.getElementById('register-form');
        
        confirmPassword.addEventListener('input', function() {
            if (this.value !== passwordInput.value) {
                this.setCustomValidity('Passwords do not match');
            } else {
                this.setCustomValidity('');
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Wallet - Notifications</title>
    <link rel="stylesheet" href="../static/css/style.css" />
    <style>
        
    </style>
</head>
<body>
    <header class="main-header">
        <nav class="nav-container">
            <div class="logo">💰 Smart Wallet</div>
            <ul class="nav-links">
                <li><a href="index.html">Dashboard</a></li>
                <li><a href="budget.html">Budgets</a></li>
                <li><a href="saving_goals.html">Goals</a></li>
                <li><a href="advisor.html">Advisor</a></li>
                <li><a href="transactions.html">Transactions</a></li>
                <li><a href="profile.html">Profile</a></li>
            </ul>
            <button class="logout-btn" id="logout-btn" style="background: rgba(0,0,0,0.1); border: none; padding: 0.5rem 1rem; border-radius: var(--radius-md); cursor: pointer;">🚪 Logout</button>
        </nav>
    </header>

    <main class="container">
        <div class="notifications-header">
            <div>
                <h1>🔔 Notifications</h1>
                <p style="color: var(--gray);">Stay updated with your financial activities</p>
            </div>
            <button class="mark-all-btn" onclick="markAllAsRead()">✓ Mark all as read</button>
        </div>

        <!-- Filter Tabs -->
        <div class="filter-tabs">
            <button class="filter-tab active" data-filter="all">All</button>
            <button class="filter-tab" data-filter="unread">Unread</button>
            <button class="filter-tab" data-filter="budget">Budget Alerts</button>
            <button class="filter-tab" data-filter="goal">Goal Updates</button>
            <button class="filter-tab" data-filter="transaction">Transactions</button>
        </div>

        <!-- Notifications List -->
        <div id="notificationsList"></div>
    </main>

    <footer class="main-footer">
        <p>&copy; 2026 Smart Wallet. All rights reserved.</p>
    </footer>

    <script src="../static/js/config.js"></script>
    <script src="../static/js/auth.js"></script>
    <script src="../static/js/notifications.js"></script>
    
    
</body>
</html>
